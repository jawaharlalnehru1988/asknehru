<div class="min-h-screen bg-slate-50 relative overflow-hidden font-sans" *ngIf="!loading && roadmap">
    <!-- Decorative Background Elements -->
    <div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
        <!-- Technical Grid -->
        <div class="absolute inset-0 opacity-[0.03]" 
             style="background-image: radial-gradient(#0f172a 1px, transparent 1px); background-size: 30px 30px;">
        </div>
        
        <!-- Soft Organic Lines -->
        <svg class="absolute top-0 right-0 w-1/2 h-full opacity-10" viewBox="0 0 400 800" fill="none">
            <path d="M400 100C300 150 200 50 100 150S-100 250 -200 400" stroke="#3b82f6" stroke-width="2" />
            <path d="M420 120C320 170 220 70 120 170S-80 270 -180 420" stroke="#6366f1" stroke-width="1" stroke-dasharray="10 10" />
            <path d="M380 80C280 130 180 30 80 130S-120 230 -220 380" stroke="#2563eb" stroke-width="0.5" />
        </svg>

        <svg class="absolute bottom-0 left-0 w-1/2 h-full opacity-10" viewBox="0 0 400 800" fill="none">
            <path d="M0 700C100 650 200 750 300 650S500 550 600 400" stroke="#3b82f6" stroke-width="2" />
            <path d="M-20 680C80 630 180 730 280 630S480 530 580 380" stroke="#6366f1" stroke-width="1" stroke-dasharray="10 10" />
        </svg>

        <!-- Blurred Orbs -->
        <div class="absolute top-0 right-0 w-96 h-96 bg-blue-100 rounded-full blur-[120px] opacity-40 -mr-20 -mt-20"></div>
        <div class="absolute bottom-0 left-0 w-96 h-96 bg-indigo-100 rounded-full blur-[120px] opacity-40 -ml-20 -mb-20"></div>
    </div>

    <!-- Hero Section -->
    <div class="relative h-[450px] w-full overflow-hidden" *ngIf="roadmap.imageUrl">
        <img [src]="'https://api.asknehru.com' + roadmap.imageUrl" alt="{{ roadmap.mainTopic }}"
            class="w-full h-full object-cover scale-105">
        <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-slate-900/40 to-transparent"></div>
        <div class="absolute bottom-0 left-0 right-0 p-8 md:p-16 max-w-6xl mx-auto">
            <div class="flex flex-col gap-4 animate-fade-in-up">
                <span class="inline-flex items-center px-4 py-1.5 rounded-full text-sm font-bold bg-blue-500/20 text-blue-200 backdrop-blur-md border border-blue-500/30 w-fit">
                    Curated Roadmap
                </span>
                <h1 class="text-5xl md:text-7xl text-white font-black tracking-tight drop-shadow-2xl">
                    {{ roadmap.mainTopic }}
                </h1>
            </div>
        </div>
    </div>

    <!-- No Image Header -->
    <div class="pt-24 pb-12 px-8 max-w-6xl mx-auto text-center" *ngIf="!roadmap.imageUrl">
        <div class="inline-flex items-center px-4 py-1.5 rounded-full text-sm font-bold bg-blue-100 text-blue-700 mb-6">
            Learning Path
        </div>
        <h1 class="text-6xl md:text-8xl text-slate-900 font-black tracking-tighter mb-8 leading-none">
            {{ roadmap.mainTopic }}
        </h1>
        <div class="w-32 h-2.5 bg-blue-600 mx-auto rounded-full shadow-lg shadow-blue-200"></div>
    </div>

    <!-- Main Content -->
    <main class="relative z-10 max-w-5xl mx-auto px-6 -mt-20 md:-mt-32 pb-32">
        <div class="grid grid-cols-1 gap-12">
            
            <!-- Introduction Card -->
            <div class="bg-white/70 backdrop-blur-2xl rounded-[2.5rem] shadow-[0_32px_64px_-15px_rgba(0,0,0,0.08)] border border-white p-10 md:p-16 transition-all hover:shadow-[0_48px_80px_-20px_rgba(0,0,0,0.12)]">
                <div class="relative">
                    <div class="absolute -left-4 top-0 w-1 h-full bg-blue-600 rounded-full"></div>
                    <h3 class="text-xs font-black text-blue-600 uppercase tracking-[0.3em] mb-6 pl-4">Vision & Intent</h3>
                    <p class="text-2xl md:text-3xl text-slate-800 leading-[1.6] font-semibold tracking-tight italic pl-4">
                        "{{ roadmap.intro }}"
                    </p>
                </div>
            </div>

            <!-- Syllabus Section -->
            <div class="bg-white rounded-[2.5rem] shadow-[0_32px_64px_-15px_rgba(0,0,0,0.05)] border border-slate-100 overflow-hidden">
                <div class="bg-slate-50/50 border-b border-slate-100 p-10 md:px-16 flex items-center justify-between">
                    <div class="flex items-center gap-6">
                        <div class="w-14 h-14 bg-slate-900 rounded-2xl flex items-center justify-center text-white shadow-2xl shadow-slate-400/50 rotate-3 transition-transform hover:rotate-0">
                             <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                            </svg>
                        </div>
                        <div>
                            <h2 class="text-3xl font-black text-slate-900 tracking-tight">Structured Syllabus</h2>
                            <p class="text-slate-500 font-medium">Follow this step-by-step master plan</p>
                        </div>
                    </div>
                </div>
                
                <div class="p-10 md:p-16">
                    <markdown [data]="roadmap.syllabus" 
                        class="premium-markdown prose prose-slate lg:prose-xl max-w-none">
                    </markdown>
                </div>
            </div>

            <!-- Navigation -->
            <div class="flex flex-col md:flex-row items-center justify-center gap-6 pt-12">
                <a routerLink="/home" class="group relative px-10 py-5 bg-slate-900 text-white rounded-2xl font-bold transition-all hover:scale-[1.02] active:scale-[0.98] shadow-2xl shadow-slate-300 hover:shadow-slate-400 flex items-center gap-3">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 transition-transform group-hover:-translate-x-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                    Return to Explorer
                </a>
            </div>
        </div>
    </main>
</div>

<!-- Loading State -->
<div *ngIf="loading" class="min-h-screen bg-slate-50 flex flex-col justify-center items-center gap-6">
    <div class="relative">
        <div class="w-20 h-20 border-4 border-blue-100 rounded-full"></div>
        <div class="absolute top-0 left-0 w-20 h-20 border-4 border-blue-600 rounded-full border-t-transparent animate-spin"></div>
    </div>
    <p class="text-slate-500 font-bold animate-pulse tracking-widest uppercase text-xs">Architecting your path...</p>
</div>

<!-- Error State -->
<div *ngIf="error" class="min-h-screen bg-slate-50 flex flex-col justify-center items-center p-8 text-center">
    <div class="w-20 h-20 bg-red-100 rounded-3xl flex items-center justify-center text-red-600 mb-6">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
    </div>
    <h2 class="text-3xl font-black text-slate-900 mb-2">Oops! Something went wrong</h2>
    <p class="text-slate-500 mb-8 max-w-md">{{ error }}</p>
    <a routerLink="/home" class="px-8 py-3 bg-slate-900 text-white rounded-xl font-bold shadow-lg">Go Back Home</a>
</div>
