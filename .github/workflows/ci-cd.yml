name: AskNehru Angular CI/CD

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Build Angular App
        run: npm run build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@master
        with:
          host: 91.99.67.35
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            set -e

            cd /var/www/asknehru
            git pull origin master
            npm ci
            npm run build

            sudo chown -R www-data:www-data /var/www/asknehru/dist
            sudo find /var/www/asknehru/dist -type d -exec chmod 755 {} \;
            sudo find /var/www/asknehru/dist -type f -exec chmod 644 {} \;

            sudo nginx -t
            sudo systemctl reload nginx

            echo "Deployment successful"
